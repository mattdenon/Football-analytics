<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <title>Deep-Data Football</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: #e2e8f0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
            -webkit-tap-highlight-color: transparent;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .match-card {
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }
        .match-card:hover {
            transform: translateY(-2px);
            border-left: 3px solid #6366f1;
            background: rgba(99, 102, 241, 0.08);
        }
        .power-bar {
            background: linear-gradient(90deg, #ef4444 0%, #f59e0b 50%, #10b981 100%);
            height: 4px;
            border-radius: 2px;
        }
        .value-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #000;
            font-weight: bold;
        }
        .safe-badge {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }
        .live-indicator {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .grid-cols-custom {
            grid-template-columns: 80px 1fr 100px 120px 200px 150px 120px 120px;
        }
        @media (max-width: 1280px) {
            .responsive-hide { display: none; }
        }
        /* Optimisations mobile */
        @media (max-width: 768px) {
            .mobile-stack { display: block; }
            .mobile-hide { display: none; }
        }
    </style>
</head>

        </div>
    </header>

    <div class="max-w-[1920px] mx-auto px-4 py-4 space-y-4">
        
        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="glass-panel p-3 rounded-lg border-l-4 border-indigo-500">
                <div class="text-xs text-slate-400 uppercase">Total Matchs</div>
                <div class="text-2xl font-bold text-white" id="totalMatches">0</div>
            </div>
            <div class="glass-panel p-3 rounded-lg border-l-4 border-emerald-500">
                <div class="text-xs text-slate-400 uppercase">Value Bets</div>
                <div class="text-2xl font-bold text-emerald-400" id="valueCount">0</div>
            </div>
            <div class="glass-panel p-3 rounded-lg border-l-4 border-amber-500">
                <div class="text-xs text-slate-400 uppercase">High Conf</div>
                <div class="text-2xl font-bold text-amber-400" id="highConfCount">0</div>
            </div>
            <div class="glass-panel p-3 rounded-lg border-l-4 border-purple-500">
                <div class="text-xs text-slate-400 uppercase">Small Markets</div>
                <div class="text-2xl font-bold text-purple-400" id="smallMarketsCount">0</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="glass-panel p-4 rounded-xl flex flex-wrap gap-3 items-center">
            <input type="text" id="searchInput" placeholder="Rechercher équipe..." 
                class="px-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 w-full md:w-48">
            
            <select id="leagueFilter" class="px-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-sm text-white focus:outline-none focus:border-indigo-500">
                <option value="all">Toutes Compétitions</option>
            </select>

            <button onclick="toggleValueOnly()" id="valueBtn" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-lg text-sm font-medium transition">
                Value Bets Only
            </button>
            
            <button onclick="exportCSV()" class="ml-auto px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium transition">
                Export CSV
            </button>
        </div>

        <!-- Matches -->
        <div id="matchesContainer" class="space-y-2 pb-8"></div>
        
        <div class="text-center py-4">
            <button onclick="loadMore()" id="loadMoreBtn" class="px-6 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-lg text-sm font-medium transition">
                Charger plus...
            </button>
        </div>
    </div>

    <!-- Modal -->
    <div id="detailModal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-50 hidden overflow-y-auto">
        <div class="min-h-screen px-4 py-8 flex items-center justify-center">
            <div class="glass-panel w-full max-w-4xl rounded-2xl p-6 border border-indigo-500/30 relative">
                <button onclick="closeModal()" class="absolute top-4 right-4 w-10 h-10 bg-slate-800 hover:bg-slate-700 rounded-full flex items-center justify-center transition">✕</button>
                <div id="modalContent"></div>
            </div>

    </div>

            {id: 19, league: "Serie B 🇧🇷", time: "02:30", home: "Goias", away: "CRB", power: 70, xGH: "📈 1.7", xGA: "📉 0.9", h2h: "Goias récent descent Série A", context: "Favorite pour remontée", prob: {h:58, d:25, a:17}, safe: "1 @1.60", value: "1/1 @2.80", edge: 9.2, tactique: "4-2-3-1 offensif vs 4-4-2 compact", absences: "CRB: Attaquant", formH: ["W","D","W","W","L"], formA: ["L","L","D","L","W"]},
            {id: 20, league: "A-League 🇦🇺", time: "09:00", home: "Melbourne City", away: "Sydney FC", power: 69, xGH: "📈 1.7", xGA: "📈 1.6", h2h: "City récent supérieur", context: "A-League fin saison", prob: {h:45, d:28, a:27}, safe: "1X @1.50", value: "Over 2.5 @1.75", edge: 6.8, tactique: "Jeu australien ouvert", absences: "Sydney: GK blessé", formH: ["W","D","W","W","L"], formA: ["L","W","D","W","W"]}
        ];

        let currentPage = 0;
        const matchesPerPage = 10;
        let filteredMatches = [...allMatches];
        let valueOnly = false;

        function init() {
            updateStats();
            populateLeagues();
            renderMatches();
        }

        function updateStats() {
            document.getElementById('totalMatches').textContent = allMatches.length;
            document.getElementById('matchCount').textContent = allMatches.length;
            document.getElementById('valueCount').textContent = allMatches.filter(m => m.edge > 8).length;
            document.getElementById('highConfCount').textContent = allMatches.filter(m => m.power >= 70).length;
            document.getElementById('smallMarketsCount').textContent = allMatches.filter(m => 
                m.league.includes('🇷🇴') || m.league.includes('🇵🇾') || m.league.includes('🇨🇴') || 
                m.league.includes('🇳🇴') || m.league.includes('🇷🇺') || m.league.includes('🇳🇬') || 
                m.league.includes('🇪🇬') || m.league.includes('🇹🇳') || m.league.includes('🇲🇦')
            ).length;
        }

        function populateLeagues() {
            const leagues = [...new Set(allMatches.map(m => m.league))].sort();
            const select = document.getElementById('leagueFilter');
            leagues.forEach(l => {
                const option = document.createElement('option');
                option.value = l;
                option.textContent = l;
                select.appendChild(option);
            });
        }

        function filterMatches() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const league = document.getElementById('leagueFilter').value;

            filteredMatches = allMatches.filter(m => {
                const matchSearch = m.home.toLowerCase().includes(search) || m.away.toLowerCase().includes(search);
                const matchLeague = league === 'all' || m.league === league;
                const matchValue = valueOnly ? m.edge > 5 : true;
                return matchSearch && matchLeague && matchValue;
            });

            currentPage = 0;
            document.getElementById('matchesContainer').innerHTML = '';
            renderMatches();
        }

        function toggleValueOnly() {
            valueOnly = !valueOnly;
            const btn = document.getElementById('valueBtn');
            if (valueOnly) {
                btn.classList.add('bg-indigo-600', 'text-white');
                btn.classList.remove('bg-slate-800');
            } else {
                btn.classList.remove('bg-indigo-600', 'text-white');
                btn.classList.add('bg-slate-800');
            }
            filterMatches();
        }

        function renderMatches() {
            const container = document.getElementById('matchesContainer');
            const start = currentPage * matchesPerPage;
            const end = start + matchesPerPage;
            const toShow = filteredMatches.slice(start, end);

            toShow.forEach(match => {
                const div = document.createElement('div');
                div.className = 'match-card glass-panel rounded-lg p-4 cursor-pointer';
                div.onclick = () => showDetails(match);
                
                const powerColor = match.power >= 75 ? 'text-emerald-400' : match.power >= 65 ? 'text-indigo-400' : 'text-slate-400';
                
                div.innerHTML = `
                    <div class="flex flex-col md:grid md:grid-cols-8 gap-4 items-center">
                        <div class="flex justify-between w-full md:block">
                            <span class="text-xs font-mono text-slate-400">${match.time}</span>
                            <span class="text-xs text-indigo-400 md:hidden">${match.league}</span>
                        </div>
                        <div class="w-full md:col-span-2">
                            <div class="font-bold text-white">${match.home}</div>
                            <div class="font-bold text-slate-400">${match.away}</div>
                            <div class="text-xs text-indigo-400 hidden md:block">${match.league}</div>
                        </div>
                        <div class="flex items-center gap-2 w-full md:justify-center">
                            <span class="text-lg font-bold ${powerColor}">${match.power}</span>
                            <div class="w-16 bg-slate-800 rounded-full h-1.5">
                                <div class="power-bar h-1.5 rounded-full" style="width: ${match.power}%"></div>
                            </div>
                        </div>
                        <div class="text-xs mono w-full md:text-center">
                            <div class="text-emerald-400">${match.xGH}</div>
                            <div class="text-red-400">${match.xGA}</div>
                        </div>
                        <div class="hidden md:block text-xs text-slate-300 text-center">
                            1:${match.prob.h}% X:${match.prob.d}% 2:${match.prob.a}%
                        </div>
                        <div class="w-full md:text-center">
                            <span class="safe-badge px-3 py-1 rounded text-xs">${match.safe}</span>
                        </div>
                        <div class="w-full md:text-center">
                            <span class="value-badge px-3 py-1 rounded text-xs flex items-center justify-center gap-1">
                                ${match.value} <span class="text-[10px]">+${match.edge}%</span>
                            </span>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });

            document.getElementById('loadMoreBtn').style.display = end >= filteredMatches.length ? 'none' : 'block';
        }

        function loadMore() {
            currentPage++;
            renderMatches();
        }

        function showDetails(match) {
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <h2 class="text-2xl font-bold text-white mb-4">${match.home} vs ${match.away}</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-slate-900/50 p-4 rounded-xl">
                        <h4 class="text-emerald-400 text-xs uppercase mb-2">Forme Domicile</h4>
                        <div class="flex gap-1 mb-2">
                            ${match.formH.map(r => `<span class="w-8 h-8 flex items-center justify-center rounded ${r === 'W' ? 'bg-emerald-500/20 text-emerald-400' : r === 'D' ? 'bg-amber-500/20 text-amber-400' : 'bg-red-500/20 text-red-400'} text-xs font-bold">${r}</span>`).join('')}
                        </div>
                        <div class="text-sm text-slate-300">${match.xGH} xG/match</div>
                    </div>
                    <div class="bg-slate-900/50 p-4 rounded-xl">
                        <h4 class="text-red-400 text-xs uppercase mb-2">Forme Extérieur</h4>
                        <div class="flex gap-1 mb-2">
                            ${match.formA.map(r => `<span class="w-8 h-8 flex items-center justify-center rounded ${r === 'W' ? 'bg-emerald-500/20 text-emerald-400' : r === 'D' ? 'bg-amber-500/20 text-amber-400' : 'bg-red-500/20 text-red-400'} text-xs font-bold">${r}</span>`).join('')}
                        </div>
                        <div class="text-sm text-slate-300">${match.xGA} xG/match</div>
                    </div>
                    <div class="bg-slate-900/50 p-4 rounded-xl">
                        <h4 class="text-indigo-400 text-xs uppercase mb-2">Probabilités</h4>
                        <div class="space-y-2">
                            <div class="flex justify-between text-sm"><span>Home</span><span class="text-emerald-400 font-bold">${match.prob.h}%</span></div>
                            <div class="flex justify-between text-sm"><span>Nul</span><span class="text-amber-400 font-bold">${match.prob.d}%</span></div>
                            <div class="flex justify-between text-sm"><span>Away</span><span class="text-indigo-400 font-bold">${match.prob.a}%</span></div>
                        </div>
                    </div>
                </div>
                <div class="space-y-3 mb-6">
                    <div class="bg-indigo-900/30 p-4 rounded-xl border-l-4 border-indigo-500">
                        <h4 class="font-bold text-white mb-1">⚽ Tactique</h4>
                        <p class="text-sm text-slate-300">${match.tactique}</p>
                        <p class="text-xs text-slate-400 mt-1">${match.h2h}</p>
                    </div>
                    <div class="bg-amber-900/30 p-4 rounded-xl border-l-4 border-amber-500">
                        <h4 class="font-bold text-white mb-1">⚠️ Contexte</h4>
                        <p class="text-sm text-slate-300">${match.context}</p>
                        <p class="text-sm text-red-400 mt-1">${match.absences}</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="safe-badge p-4 rounded-xl text-center">
                        <div class="text-xs uppercase font-bold mb-1">Safe Pick</div>
                        <div class="text-lg font-bold text-white">${match.safe}</div>
                    </div>
                    <div class="value-badge p-4 rounded-xl text-center">
                        <div class="text-xs uppercase font-bold mb-1">Value Pick</div>
                        <div class="text-lg font-bold">${match.value}</div>
                        <div class="text-xs mt-1">Edge: +${match.edge}%</div>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        function exportCSV() {
            let csv = 'Competition,Heure,Match,Power,Safe Pick,Value Pick,Edge\\n';
            filteredMatches.forEach(m => {
                csv += `${m.league},${m.time},${m.home} vs ${m.away},${m.power},${m.safe},${m.value},${m.edge}\\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'analyse_football.csv');
            a.click();
        }

        document.getElementById('searchInput').addEventListener('input', filterMatches);
        document.getElementById('leagueFilter').addEventListener('change', filterMatches);
        
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        init();
    </script>
</body>
</html>
